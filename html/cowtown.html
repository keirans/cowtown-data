<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Cowaramup Bay daily conditions briefing">
  <meta property="og:title" content="Cowaramup Bay · Monday 19 May 2026">
  <title>Cowaramup Bay · Morning briefing</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      line-height: 1.6;
      padding: 20px;
    }
    
    @media (prefers-color-scheme: dark) {
      body {
        background: #0f0f0f;
        color: #e8e8e8;
      }
    }
    
    .container {
      max-width: 680px;
      margin: 0 auto;
    }
    
    /* Header */
    .header {
      margin-bottom: 32px;
      text-align: center;
    }
    
    .header h1 {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }
    
    .header .subtitle {
      font-size: 16px;
      font-weight: 400;
      color: #666;
      margin-bottom: 8px;
    }
    
    @media (prefers-color-scheme: dark) {
      .header .subtitle {
        color: #999;
      }
    }
    
    .header .meta {
      font-size: 12px;
      color: #999;
    }
    
    @media (prefers-color-scheme: dark) {
      .header .meta {
        color: #666;
      }
    }
    
    /* Stat Strip */
    .stat-strip {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }
    
    @media (min-width: 640px) {
      .stat-strip {
        grid-template-columns: repeat(4, 1fr);
      }
    }
    
    .stat-card {
      background: #f5f5f5;
      padding: 16px;
      border-radius: 10px;
      text-align: center;
    }
    
    @media (prefers-color-scheme: dark) {
      .stat-card {
        background: #1e1e1e;
      }
    }
    
    .stat-card .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin-bottom: 8px;
    }
    
    @media (prefers-color-scheme: dark) {
      .stat-card .label {
        color: #777;
      }
    }
    
    .stat-card .value {
      font-size: 20px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 4px;
    }
    
    .stat-card .unit {
      font-size: 12px;
      color: #888;
    }
    
    @media (prefers-color-scheme: dark) {
      .stat-card .unit {
        color: #777;
      }
    }
    
    /* Sections */
    .section {
      margin-bottom: 28px;
    }
    
    .section h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 12px;
      font-weight: 600;
    }
    
    @media (prefers-color-scheme: dark) {
      .section h2 {
        color: #777;
      }
    }
    
    .section p {
      font-size: 14px;
      line-height: 1.7;
      color: #1a1a1a;
    }
    
    @media (prefers-color-scheme: dark) {
      .section p {
        color: #e8e8e8;
      }
    }
    
    /* Two Column */
    .two-column {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }
    
    @media (min-width: 640px) {
      .two-column {
        grid-template-columns: 1fr 1fr;
      }
    }
    
    .two-column > div {
      background: #f5f5f5;
      padding: 16px;
      border-radius: 10px;
    }
    
    @media (prefers-color-scheme: dark) {
      .two-column > div {
        background: #1e1e1e;
      }
    }
    
    .two-column .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin-bottom: 8px;
    }
    
    @media (prefers-color-scheme: dark) {
      .two-column .label {
        color: #777;
      }
    }
    
    .two-column .value {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .two-column .detail {
      font-size: 13px;
      color: #666;
    }
    
    @media (prefers-color-scheme: dark) {
      .two-column .detail {
        color: #999;
      }
    }
    
    /* Bins */
    .bins {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }
    
    .bin-pill {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .bin-yellow {
      background: #ffd700;
      color: #8b6f00;
    }
    
    .bin-red {
      background: #dc143c;
      color: #8b0000;
    }
    
    .bin-green {
      background: #64bf30;
      color: #2d5a00;
    }
    
    /* Footer */
    .footer {
      text-align: center;
      padding-top: 20px;
      border-top: 1px solid #ddd;
      font-size: 12px;
      color: #999;
    }
    
    @media (prefers-color-scheme: dark) {
      .footer {
        border-top-color: #333;
        color: #666;
      }
    }
    
    .footer a {
      color: #666;
      text-decoration: none;
    }
    
    @media (prefers-color-scheme: dark) {
      .footer a {
        color: #999;
      }
    }
    
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>Cowaramup Bay</h1>
      <div class="subtitle">Monday 19 May 2026 · Morning briefing
