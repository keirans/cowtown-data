<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Cowaramup Bay daily conditions briefing">
  <meta property="og:title" content="Cowaramup Bay · Monday 19 May 2026">
  <title>Cowaramup Bay · Monday 19 May 2026</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      line-height: 1.6;
      padding: 24px 20px;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #0f0f0f;
        color: #e8e8e8;
      }
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    /* Header */
    .page-header {
      margin-bottom: 32px;
      text-align: center;
    }

    .page-header h1 {
      font-size: 36px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .page-header .subtitle {
      font-size: 16px;
      color: #666;
    }

    @media (prefers-color-scheme: dark) {
      .page-header .subtitle {
        color: #999;
      }
    }

    .page-header .meta {
      font-size: 12px;
      color: #999;
      margin-top: 12px;
    }

    @media (prefers-color-scheme: dark) {
      .page-header .meta {
        color: #777;
      }
    }

    /* Stat Strip */
    .stat-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: #f5f5f5;
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }

    @media (prefers-color-scheme: dark) {
      .stat-card {
        background: #1e1e1e;
      }
    }

    .stat-card .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #999;
      margin-bottom: 8px;
      font-weight: 500;
    }

    @media (prefers-color-scheme: dark) {
      .stat-card .label {
        color: #777;
      }
    }

    .stat-card .value {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .stat-card .subtext {
      font-size: 12px;
      color: #666;
    }

    @media (prefers-color-scheme: dark) {
      .stat-card .subtext {
        color: #aaa;
      }
    }

    /* Sections */
    .section {
      margin-bottom: 32px;
    }

    .section-heading {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #999;
      margin-bottom: 12px;
      font-weight: 500;
    }

    @media (prefers-color-scheme: dark) {
      .section-heading {
        color: #777;
      }
    }

    .section-text {
      font-size: 14px;
      line-height: 1.7;
      color: #1a1a1a;
    }

    @media (prefers-color-scheme: dark) {
      .section-text {
        color: #e8e8e8;
      }
    }

    /* Two Column */
    .two-column {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 32px;
    }

    @media (max-width: 480px) {
      .two-column {
        grid-template-columns: 1fr;
      }
    }

    .info-block {
      background: #f5f5f5;
      border-radius: 10px;
      padding: 16px;
    }

    @media (prefers-color-scheme: dark) {
      .info-block {
        background: #1e1e1e;
      }
    }

    .info-block .heading {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #999;
      margin-bottom: 12px;
      font-weight: 600;
    }

    @media (prefers-color-scheme: dark) {
      .info-block .heading {
        color: #777;
      }
    }

    .info-block .detail {
      font-size: 13px;
      line-height: 1.7;
      color: #1a1a1a;
    }

    @media (prefers-color-scheme: dark) {
      .info-block .detail {
        color: #e8e8e8;
      }
    }

    .info-block .detail strong {
      display: block;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    /* Bins */
    .bins-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .bin-pill {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .bin-yellow {
      background: #ffd700;
      color: #8b6e00;
    }

    .bin-red {
      background: #ff4444;
      color: #8b0000;
    }

    .bin-green {
      background: #64bf30;
      color: #2d5a1a;
    }

    /* Footer */
    .page-footer {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid #e0e0e0;
      font-size: 12px;
      color: #999;
      text-align: center;
    }

    @media (prefers-color-scheme: dark) {
      .page-footer {
        border-top-color: #333;
        color: #777;
      }
    }

    .page-footer a {
      color: #666;
      text-decoration: none;
    }

    @media (prefers-color-scheme: dark) {
      .page-footer a {
        color: #999;
      }
    }

    .page-footer a:hover {
      text-decoration: underline;
    }

    .page-footer p {
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="page-header">
      <h1>Cowaramup Bay</h1>
      <div class="subtitle">Monday 19 May 2026 · Morning briefing</div>
